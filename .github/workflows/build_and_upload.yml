name: Build and upload

on:
  - push
  - pull_request

jobs:
  build:
    name: ${{ matrix.os }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-latest, macos-latest ]
        build_type: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev

      - name: Install WiX (Windows)
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'ffffe619563988cbcfda2b8db2c142654d12eaf5'  # pin to a stable commit

      - name: Set vcpkg triplet
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "VCPKG_TRIPLET=x64-windows-static" >> $GITHUB_ENV
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "VCPKG_TRIPLET=x64-osx" >> $GITHUB_ENV
          else
            echo "VCPKG_TRIPLET=x64-linux" >> $GITHUB_ENV
          fi

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev gcc-14 g++-14

      - name: Configure
        shell: bash
        run: |
          cmake -S "${{ github.workspace }}" -B "${{ github.workspace }}/build" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }} \
          ${{ runner.os == 'Linux' && '-DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14' || '' }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --parallel

      - name: Package
        if: matrix.build_type == 'Release'
        working-directory: ${{ github.workspace }}/build
        run: cpack -C ${{ matrix.build_type }} --verbose

      - name: Upload packages (Linux)
        if: matrix.build_type == 'Release' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz
          if-no-files-found: error

      - name: Upload packages (Windows)
        if: matrix.build_type == 'Release' && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            build/*.exe
            build/*.msi
            build/*.zip
          if-no-files-found: error

      - name: Upload packages (macOS)
        if: matrix.build_type == 'Release' && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            build/*.tar.gz
            build/*.dmg
            build/*.pkg
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
            build/vcpkg-manifest-install.log